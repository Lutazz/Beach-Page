<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>小陆的海边主页 🏖️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 海边场景 -->
  <div class="scene">

    <!-- 天空 -->
    <div class="sky">
      <div class="sun"></div>
      <div class="cloud cloud1">
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
      </div>
      <div class="cloud cloud2">
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
      </div>
      <div class="cloud cloud3">
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
      </div>
      <div class="cloud cloud4">
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
      </div>
      <div class="cloud cloud5">
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
      </div>
      <div class="cloud cloud6">
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
      </div>
      <div class="cloud cloud7">
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
        <div class="cloud-puff"></div>
      </div>

      <!-- 海鸥 -->
      <div class="seagull seagull1">~</div>
      <div class="seagull seagull1b">~</div>
      <div class="seagull seagull2">~</div>
      <div class="seagull seagull3">~</div>
      <div class="seagull seagull4">~</div>
      <div class="seagull seagull4b">~</div>
    </div>

    <!-- 游轮（独立于 .sea，避免 overflow:hidden 裁切） -->
    <div class="cruise-ship">
      <div class="ship-hull"></div>
      <div class="ship-deck"></div>
      <div class="ship-cabin"></div>
      <div class="smokestack-large"></div>
      <div class="smokestack-small"></div>
      <div class="ship-smoke smoke1"></div>
      <div class="ship-smoke smoke2"></div>
      <div class="ship-smoke smoke3"></div>
      <div class="ship-window"></div>
      <div class="ship-window"></div>
      <div class="ship-window"></div>
      <div class="ship-window"></div>
      <div class="ship-wake wake1"></div>
      <div class="ship-wake wake2"></div>
      <div class="ship-wake wake3"></div>

    </div>

    <!-- 大海 -->
    <div class="sea">
      <div class="wave wave1"></div>
      <div class="wave wave2"></div>
      <div class="wave wave3"></div>
      <!-- 鲨鱼鳍 -->
      <div class="shark-fin">
        <div class="shark-fin-body"></div>
        <div class="shark-wake"></div>
      </div>
    </div>

    <!-- 沙滩 -->
    <div class="beach">
      <!-- 沙滩装饰 -->
      <div class="shell shell1">🐚</div>
      <div class="shell shell2">⭐</div>
      <div class="shell shell3">🐚</div>
      <div class="shell shell4">⭐</div>
      <div class="shell shell5">⭐</div>
      <div class="shell shell6">⭐</div>
      <div class="shell shell7">🐚</div>
      <div class="shell shell8">🐚</div>
      <div class="shell shell9">🐚</div>
      <div class="shell shell10">🐚</div>

      <!-- 螃蟹 -->
      <div class="crab crab-large">
        <div class="crab-body">
          <div class="crab-eye crab-eye-left"></div>
          <div class="crab-eye crab-eye-right"></div>
          <div class="crab-claw crab-claw-left"></div>
          <div class="crab-claw crab-claw-right"></div>
          <div class="crab-leg crab-leg-1"></div>
          <div class="crab-leg crab-leg-2"></div>
          <div class="crab-leg crab-leg-3"></div>
          <div class="crab-leg crab-leg-4"></div>
        </div>
      </div>
      <div class="crab crab-small">
        <div class="crab-body">
          <div class="crab-eye crab-eye-left"></div>
          <div class="crab-eye crab-eye-right"></div>
          <div class="crab-claw crab-claw-left"></div>
          <div class="crab-claw crab-claw-right"></div>
          <div class="crab-leg crab-leg-1"></div>
          <div class="crab-leg crab-leg-2"></div>
          <div class="crab-leg crab-leg-3"></div>
          <div class="crab-leg crab-leg-4"></div>
        </div>
      </div>

      <!-- 大螃蟹痕迹 -->
      <div class="crab-trace crab-trace-large">
        <div class="crab-dot t1"></div>
        <div class="crab-dot t2"></div>
        <div class="crab-dot t3"></div>
        <div class="crab-dot t4"></div>
        <div class="crab-dot t5"></div>
        <div class="crab-dot t6"></div>
        <div class="crab-dot t7"></div>
        <div class="crab-dot t8"></div>
        <div class="crab-dot t9"></div>
        <div class="crab-dot t10"></div>
        <div class="crab-dot t11"></div>
        <div class="crab-dot t12"></div>
      </div>

      <!-- 小螃蟹痕迹 -->
      <div class="crab-trace crab-trace-small">
        <div class="crab-dot t1"></div>
        <div class="crab-dot t2"></div>
        <div class="crab-dot t3"></div>
        <div class="crab-dot t4"></div>
        <div class="crab-dot t5"></div>
        <div class="crab-dot t6"></div>
        <div class="crab-dot t7"></div>
        <div class="crab-dot t8"></div>
        <div class="crab-dot t9"></div>
        <div class="crab-dot t10"></div>
        <div class="crab-dot t11"></div>
        <div class="crab-dot t12"></div>
      </div>
    </div>

    <!-- 小狗 -->
    <div class="dog">
      <!-- 身体 -->
      <div class="dog-body"></div>
      <!-- 头 -->
      <div class="dog-head">
        <!-- 耳朵 -->
        <div class="dog-ear dog-ear-left"></div>
        <div class="dog-ear dog-ear-right"></div>
        <!-- 脸 -->
        <div class="dog-face">
          <div class="dog-eye dog-eye-left"></div>
          <div class="dog-eye dog-eye-right"></div>
          <div class="dog-nose"></div>
          <div class="dog-mouth"></div>
          <div class="dog-tongue"></div>
        </div>
      </div>
      <!-- 尾巴 -->
      <div class="dog-tail"></div>
      <!-- 前腿 -->
      <div class="dog-leg dog-leg-fl"></div>
      <div class="dog-leg dog-leg-fr"></div>
      <!-- 后腿 -->
      <div class="dog-leg dog-leg-bl"></div>
      <div class="dog-leg dog-leg-br"></div>
    </div>

    <!-- 小狗探头 -->
    <div class="dog-peek">
      <div class="dog-head">
        <div class="dog-ear dog-ear-left"></div>
        <div class="dog-ear dog-ear-right"></div>
        <div class="dog-face">
          <div class="dog-eye dog-eye-left"></div>
          <div class="dog-eye dog-eye-right"></div>
          <div class="dog-nose"></div>
          <div class="dog-mouth"></div>
          <div class="dog-tongue"></div>
        </div>
      </div>
    </div>

    <!-- 小狗脚印 -->
    <div class="paw-prints">
      <div class="paw paw1">🐾</div>
      <div class="paw paw2">🐾</div>
      <div class="paw paw3">🐾</div>
      <div class="paw paw4">🐾</div>
      <div class="paw paw5">🐾</div>
      <div class="paw paw6">🐾</div>
      <div class="paw paw7">🐾</div>
      <div class="paw paw8">🐾</div>
      <div class="paw paw9">🐾</div>
      <div class="paw paw10">🐾</div>
    </div>

    <!-- 个人信息卡片（浮在场景上） -->
    <div class="info-card">
      <h1 class="info-title">👋 你好，我是小陆</h1>
      <p class="info-desc">一个正在学习编程的 IT 初学者</p>
      <p class="info-desc">热爱 Web 开发，喜欢在海边写代码 🌊</p>
      <div class="info-divider"></div>
      <div class="info-section">
        <h2>🎯 我的技能</h2>
        <div class="skill-list">
          <span class="skill-badge">HTML</span>
          <span class="skill-badge">CSS</span>
          <span class="skill-badge">JavaScript</span>
          <span class="skill-badge">Python</span>
          <span class="skill-badge learning">Vue.js 学习中</span>
        </div>
      </div>
      <div class="info-section">
        <h2>📬 联系方式</h2>
        <p>📧 xiaolu@example.com</p>
        <p>💻 github.com/xiaolu</p>
      </div>
      <p class="info-footer">这个主页是我用纯 CSS 画的，每一行代码都是自己写的 😄</p>
    </div>

  </div>

</body>
</html>
